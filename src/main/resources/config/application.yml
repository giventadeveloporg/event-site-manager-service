# ===================================================================
# AWS S3 Configuration
# ===================================================================
aws:
  s3:
    access-key: ${AWS_ACCESS_KEY_ID}
    secret-key: ${AWS_SECRET_ACCESS_KEY}
    region: us-east-2
    bucket-name: eventapp-media-bucket

# ===================================================================
# File upload configuration
# ===================================================================

twilio:
  account-sid: ${TWILIO_ACCOUNT_SID}
  auth-token: ${TWILIO_AUTH_TOKEN}
  whatsapp-from: ${TWILIO_WHATSAPP_FROM} # e.g., 'whatsapp:+14155238886'
# url prefix for host http://localhost:3000/admin
qrcode:
  scan-host:
    url-prefix: ${QRCODE_SCAN_HOST_PREFIX}

email:
  host:
    url-prefix: ${EMAIL_HOST_URL_PREFIX}
