# ===================================================================
# Spring Boot configuration.
#
# This configuration will be overridden by the Spring profile you use,
# for example application-dev.yml if you use the "dev" profile.
#
# More information on profiles: https://www.jhipster.tech/profiles/
# More information on configuration properties: https://www.jhipster.tech/common-application-properties/
# ===================================================================

# ===================================================================
# Standard Spring Boot properties.
# Full reference is available at:
# http://docs.spring.io/spring-boot/docs/current/reference/html/common-application-properties.html
# ===================================================================

# Conditionally disable springdoc on missing api-docs profile
spring:
  config:
    activate:
      on-profile: '!api-docs'
    ignore-unknown-fields: true
  application:
    name: event_site_manager_service
  jmx:
    enabled: false
  data:
    jpa:
      repositories:
        bootstrap-mode: deferred
    web:
      pageable:
        default-page-size: 20
        max-page-size: 100
  messages:
    basename: i18n/messages
  main:
    allow-bean-definition-overriding: true
  mvc:
    problemdetails:
      enabled: true
  security:
    user:
      name: admin
      password: admin
      roles:
        - ADMIN
        - USER
  task:
    execution:
      thread-name-prefix: event-site-manager-service-task-
      pool:
        core-size: 2
        max-size: 50
        queue-capacity: 10000
    scheduling:
      thread-name-prefix: event-site-manager-service-scheduling-
      pool:
        size: 2
  output:
    ansi:
      console-available: true
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
  cache:
    # Primary cache type - Caffeine for fast in-memory caching
    # This is the default for all profiles (can be overridden in profile-specific configs)
    type: caffeine
    caffeine:
      spec: maximumSize=1000,expireAfterWrite=3600s

# ===================================================================
# Cache TTL Configuration (per cache name in seconds)
# ===================================================================
cache:
  ttl:
    userProfiles: 3600 # 1 hour - User profiles by ID
    userProfilesByUserId: 1800 # 30 minutes - User profiles by userId (frequently accessed)
    userProfilesByEmail: 1800 # 30 minutes - User profiles by email
    eventDetails: 7200 # 2 hours - Event details (less frequently changed)
    eventMedia: 3600 # 1 hour - Event media
    eventTicketTypes: 3600 # 1 hour - Ticket types
    eventTicketTransactions: 1800 # 30 minutes - Transactions (more dynamic)
    tenantSettings: 7200 # 2 hours - Tenant settings (rarely changed)
    eventTypeDetails: 7200 # 2 hours - Event type details (rarely changed)
    clerkUsers: 300 # 5 minutes - Clerk API responses (external, short TTL)
  maxSize: 1000 # Maximum entries per cache

springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: alpha
    tagsSorter: alpha
    disable-swagger-default-url: true
  show-actuator: true
  packages-to-scan: com.eventsitemanager.web.rest
  paths-to-match: /**
  default-produces-media-type: application/json
  default-consumes-media-type: application/json

server:
  servlet:
    session:
      cookie:
        http-only: true

management:
  endpoints:
    web:
      base-path: /management
      exposure:
        include:
          - configprops
          - env
          - health
          - info
          - jhimetrics
          - jhiopenapigroups
          - logfile
          - loggers
          - prometheus
          - threaddump
          - caches
          - cache
          - liquibase
  endpoint:
    health:
      show-details: when_authorized
      roles: 'ROLE_ADMIN'
      probes:
        enabled: true
      group:
        liveness:
          include: livenessState
        readiness:
          include: readinessState,db
    jhimetrics:
      enabled: true
  info:
    git:
      mode: full
    env:
      enabled: true
  health:
    mail:
      enabled: false # When using the MailService, configure an SMTP server and set this to true
  prometheus:
    metrics:
      export:
        enabled: true
        step: 60
    enable:
      http: true
      jvm: true
      logback: true
      process: true
      system: true
    distribution:
      percentiles-histogram:
        all: true
      percentiles:
        all: 0, 0.5, 0.75, 0.95, 0.99, 1.0
    tags:
      application: ${spring.application.name}
    web:
      server:
        request:
          autotime:
            enabled: true

info:
  # Comma separated list of profiles that will trigger the ribbon to show
  display-ribbon-on-profiles: 'dev'

# ===================================================================
# JHipster specific properties
#
# Full reference is available at: https://www.jhipster.tech/common-application-properties/
# ===================================================================

jhipster:
  clientApp:
    name: 'eventSiteManagerService'
  cors:
    allowed-origins: '*'
    allowed-methods: 'GET,POST,PUT,DELETE,OPTIONS'
    allowed-headers: 'Authorization,Content-Type,X-Requested-With,Accept,Origin,Access-Control-Request-Method,Access-Control-Request-Headers'
    exposed-headers: 'Authorization,Link,X-Total-Count,X-${jhipster.clientApp.name}-alert,X-${jhipster.clientApp.name}-error,X-${jhipster.clientApp.name}-params'
    allow-credentials: false
    max-age: 1800
  mail:
    from: sales@giventa.com
  api-docs:
    default-include-pattern: /api/**
    management-include-pattern: /management/**
    title: Event Site Manager Service API
    description: Event Site Manager Service API documentation
    version: 0.0.1
    terms-of-service-url:
    contact-name:
    contact-url:
    contact-email:
    license: unlicensed
    license-url:
  security:

# ===================================================================
# Application specific properties
# Add your own application properties here, see the ApplicationProperties class
# to have type-safe configuration, like in the JHipsterProperties above
#
# More documentation is available at:
# https://www.jhipster.tech/common-application-properties/
# ===================================================================

application:
  # Payment provider encryption key (Base64-encoded AES-256 key)
  # Generate a key using: PaymentCredentialEncryptionService.generateEncryptionKey()
  payment:
    encryption:
      key: ${PAYMENT_ENCRYPTION_KEY:}
  # Webhook configuration
  webhook:
    # Enable/disable ticket generation via webhooks
    # When disabled, webhooks will still update payment status but won't create tickets
    # Tickets will only be created via frontend API calls or polling
    # Default: false (disabled) - tickets should be created via frontend API calls
    ticket-generation:
      enabled: ${WEBHOOK_TICKET_GENERATION_ENABLED:false}
  # Inbound webhook listeners (payment providers, Clerk) — default off when no integration
  webhooks:
    payment-inbound:
      enabled: ${WEBHOOKS_PAYMENT_INBOUND_ENABLED:false}
    clerk-inbound:
      enabled: ${WEBHOOKS_CLERK_INBOUND_ENABLED:false}
    clerk-scheduled-tasks:
      enabled: ${WEBHOOKS_CLERK_SCHEDULED_ENABLED:false}
  batch-jobs:
    payment-cron:
      enabled: ${BATCH_JOBS_PAYMENT_CRON_ENABLED:false}

# ===================================================================
# AWS S3 Configuration
# ===================================================================
aws:
  ses:
    # AWS SES rate limit per second (adjust based on your SES account limits)
    # Default: 200 emails/second (production SES account)
    # Sandbox: 1 email/second
    rate-limit-per-second: 200
  s3:
    access-key: ${AWS_ACCESS_KEY_ID:test-access-key}
    secret-key: ${AWS_SECRET_ACCESS_KEY:test-secret-key}
    region: ${AWS_REGION:us-east-2}
    bucket-name: ${AWS_S3_BUCKET_NAME:eventapp-media-bucket}

# ===================================================================
# File upload configuration
# ===================================================================

twilio:
  account-sid: ${TWILIO_ACCOUNT_SID:test-twilio-sid}
  auth-token: ${TWILIO_AUTH_TOKEN:test-twilio-token}
  whatsapp-from: ${TWILIO_WHATSAPP_FROM:whatsapp:+10000000000} # e.g., 'whatsapp:+14155238886'
# url prefix for host http://localhost:3000/admin
qrcode:
  scan-host:
    url-prefix: ${QRCODE_SCAN_HOST_PREFIX:http://localhost:3000/admin}

email:
  host:
    url-prefix: ${EMAIL_HOST_URL_PREFIX:http://localhost:3000}
  # Tenant-based rate limiting for promotional emails
  # Each tenant can send up to this many emails per second
  tenant:
    rate-limit-per-second: 50

# ===================================================================
# WhatsApp Integration Configuration
# ===================================================================
whatsapp:
  # Encryption keys for sensitive data
  encryption:
    key: ${WHATSAPP_ENCRYPTION_KEY:your-32-character-encryption-key-here}
    algorithm: AES/GCM/NoPadding

  # Webhook configuration
  webhook:
    base-url: ${WHATSAPP_WEBHOOK_BASE_URL:http://localhost:8080}
    encryption-key: ${WHATSAPP_WEBHOOK_ENCRYPTION_KEY:your-webhook-encryption-key-here}

  # Rate limiting configuration
  rate-limit:
    messages-per-minute: ${WHATSAPP_RATE_LIMIT_MESSAGES_PER_MINUTE:20}
    bulk-messages-per-hour: ${WHATSAPP_RATE_LIMIT_BULK_MESSAGES_PER_HOUR:100}
    retry-attempts: ${WHATSAPP_RATE_LIMIT_RETRY_ATTEMPTS:3}
    retry-delay-seconds: ${WHATSAPP_RATE_LIMIT_RETRY_DELAY_SECONDS:60}

  # Message configuration
  message:
    max-recipients-per-bulk: ${WHATSAPP_MAX_RECIPIENTS_PER_BULK:1000}
    template-validation-enabled: ${WHATSAPP_TEMPLATE_VALIDATION_ENABLED:true}
    delivery-status-check-enabled: ${WHATSAPP_DELIVERY_STATUS_CHECK_ENABLED:true}

  # Logging configuration
  logging:
    enabled: ${WHATSAPP_LOGGING_ENABLED:true}
    log-level: ${WHATSAPP_LOGGING_LEVEL:INFO}
    log-message-content: ${WHATSAPP_LOG_MESSAGE_CONTENT:false}
    log-personal-data: ${WHATSAPP_LOG_PERSONAL_DATA:false}

# ===================================================================
# OAuth Configuration
# ===================================================================
# NOTE: Direct Google OAuth is DISABLED - we use Clerk SDK on frontend
google:
  oauth:
    enabled: ${GOOGLE_OAUTH_ENABLED:false}

# ===================================================================
# Batch Jobs Service Configuration
# ===================================================================
batch-jobs:
  service:
    url: ${BATCH_JOBS_SERVICE_URL:http://localhost:8081/batch-jobs}
    timeout: ${BATCH_JOBS_SERVICE_TIMEOUT:30000}
    enabled: ${BATCH_JOBS_SERVICE_ENABLED:true}
    # JWT for outbound calls to batch-jobs (must match JHipster secret on both apps). Same env vars as batch→backend.
    auth:
      username: ${BATCH_JOBS_AUTH_USER:${API_JWT_USER:}}
      password: ${BATCH_JOBS_AUTH_PASS:${API_JWT_PASS:}}
      base-url: ${BATCH_JOBS_AUTH_BASE_URL:http://localhost:8080}

# ===================================================================
# Cache Configuration - Unified for all profiles
# ===================================================================
# Primary cache: Caffeine (fast in-memory cache) - configured in spring.cache above
# Secondary cache: PostgreSQL (persistent cache for longer-term storage)
# Both caches work together - Caffeine for fast access, PostgreSQL for persistence
# PostgreSQL Cache Configuration (custom properties - available for all profiles)
# Default values ensure cache works even if environment variables are not set
# This is used as a secondary/persistent cache layer alongside Caffeine
postgresql-cache:
  enabled: ${POSTGRES_CACHE_ENABLED:true}
  cache-type: ${CACHE_TYPE:caffeine} # Primary cache type, PostgreSQL is secondary
  cache-table: ${POSTGRES_CACHE_TABLE:event_site_app_cache}
  session-table: session_store
  time-to-live: 600000 # 10 minutes
  cache-null-values: false
  enable-statistics: true
  key-prefix: 'event-mgmnt-site:postgres-cache:'
  use-key-prefix: true
  cleanup-interval: 300000 # 5 minutes
  max-cache-size: 10000
  statistics:
    enabled: true
    log-interval: 60000 # 1 minute
