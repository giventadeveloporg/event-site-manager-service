name: event-mgmnt-site

services:
  # Spring Boot Application
  app:
    env_file:
      - ../../../../.env
    build:
      context: .
      dockerfile: Dockerfile.local
    container_name: event-mgmnt-site-app
    ports:
      - '127.0.0.1:8080:8080'
    environment:
      # Spring Configuration
      SPRING_PROFILES_ACTIVE: dev
      JAVA_OPTS: ${JAVA_OPTS:-Xmx512m -Xms256m}

      # Disable Liquibase
      SPRING_LIQUIBASE_ENABLED: false

      # Database Configuration - Use container name for Docker networking
      RDS_ENDPOINT: ${RDS_ENDPOINT:-event_site_manager_db-postgresql-1}
      DB_NAME: ${DB_NAME}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}

      # Batch Jobs Service Configuration - Use container name for Docker networking
      BATCH_JOBS_SERVICE_URL: ${BATCH_JOBS_SERVICE_URL:-http://batch-jobs:8081/batch-jobs}
      BATCH_JOBS_SERVICE_TIMEOUT: ${BATCH_JOBS_SERVICE_TIMEOUT:-30000}
      BATCH_JOBS_SERVICE_ENABLED: ${BATCH_JOBS_SERVICE_ENABLED:-true}

      # PostgreSQL Caching Configuration
      CACHE_TYPE: ${CACHE_TYPE}
      POSTGRES_CACHE_TABLE: ${POSTGRES_CACHE_TABLE}

      # JWT Authentication Configuration
      JWT_API_AUTH_USERNAME: ${JWT_API_AUTH_USERNAME}
      JWT_API_AUTH_PASSWORD: ${JWT_API_AUTH_PASSWORD}

      # AWS Configuration (Direct Assignment for Docker Development)
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_REGION: ${AWS_REGION}
      AWS_S3_BUCKET_NAME: ${AWS_S3_BUCKET_NAME}

      # Twilio Configuration
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN}
      TWILIO_WHATSAPP_FROM: ${TWILIO_WHATSAPP_FROM}

      # Application URLs
      QRCODE_SCAN_HOST_PREFIX: ${QRCODE_SCAN_HOST_PREFIX}
      EMAIL_HOST_URL_PREFIX: ${EMAIL_HOST_URL_PREFIX}

      # JHipster Security Configuration
      JHIPSTER_SECURITY_AUTHENTICATION_JWT_SECRET: ${JHIPSTER_SECURITY_AUTHENTICATION_JWT_SECRET}
      JHIPSTER_SECURITY_AUTHENTICATION_JWT_BASE64_SECRET: ${JHIPSTER_SECURITY_AUTHENTICATION_JWT_BASE64_SECRET}
      JHIPSTER_SECURITY_AUTHENTICATION_JWT_TOKEN_VALIDITY_IN_SECONDS: ${JHIPSTER_SECURITY_AUTHENTICATION_JWT_TOKEN_VALIDITY_IN_SECONDS}
      JHIPSTER_SECURITY_AUTHENTICATION_JWT_TOKEN_VALIDITY_IN_SECONDS_FOR_REMEMBER_ME: ${JHIPSTER_SECURITY_AUTHENTICATION_JWT_TOKEN_VALIDITY_IN_SECONDS_FOR_REMEMBER_ME}

      # JHipster Mail Configuration
      JHIPSTER_MAIL_FROM: ${JHIPSTER_MAIL_FROM}
      JHIPSTER_MAIL_BASE_URL: ${JHIPSTER_MAIL_BASE_URL}

      # Clerk Configuration
      CLERK_AFTER_SIGN_IN_URL: ${CLERK_AFTER_SIGN_IN_URL}
      CLERK_AFTER_SIGN_UP_URL: ${CLERK_AFTER_SIGN_UP_URL}
      CLERK_FRONTEND_API: ${CLERK_FRONTEND_API}
      CLERK_PUBLISHABLE_KEY: ${CLERK_PUBLISHABLE_KEY}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY}
      CLERK_SIGN_IN_URL: ${CLERK_SIGN_IN_URL}
      CLERK_SIGN_UP_URL: ${CLERK_SIGN_UP_URL}
      CLERK_WEBHOOK_SECRET: ${CLERK_WEBHOOK_SECRET}

      # Payment Configuration
      PAYMENT_ENCRYPTION_KEY: ${PAYMENT_ENCRYPTION_KEY}

      # Server Configuration
      SERVER_PORT: ${SERVER_PORT:-8080}
    volumes:
      - ../../../../logs:/var/log/spring-boot-app
      - ../../../../target:/app/target
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8080/management/health']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    networks:
      - event-mgmnt-site-network
      - postgres-network
      - batch-jobs-network

networks:
  event-mgmnt-site-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
  # Connect to PostgreSQL network (external - created by postgres docker-compose)
  postgres-network:
    external: true
    name: event_site_manager_db_default
  # Connect to batch-jobs network (external - created by batch-jobs docker-compose)
  batch-jobs-network:
    external: true
    name: event-site-manager-batch-jobs_batch-jobs-network
